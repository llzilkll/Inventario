<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador GRAM - Maestro de Ítems</title>
    <!-- Librerías locales offline -->
    <script src="./js/lib/tailwind.js"></script>
    <script src="./js/lib/sweetalert2.all.min.js"></script>
    <script src="./js/lib/html5-qrcode.min.js"></script>
    <!-- Firebase Storage SDK (solo para imágenes, requiere conexión) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getStorage, ref, getDownloadURL } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-storage.js";

        const firebaseApp = initializeApp({
            apiKey: "AIzaSyAZwE1BoSOdm5_C6AIGh4L66cqArpTWaX8",
            storageBucket: "inventario-san-martin-pro.firebasestorage.app"
        });
        const storage = getStorage(firebaseApp);

        // Exponer función global para obtener URL de imagen de Firebase Storage
        window.getFirebaseImageUrl = async function(catalogo) {
            try {
                const extensions = ['jpg', 'jpeg', 'png', 'webp'];
                for (const ext of extensions) {
                    try {
                        const imageRef = ref(storage, `fotos_inventario/${catalogo}.${ext}`);
                        const url = await getDownloadURL(imageRef);
                        return url;
                    } catch (e) {
                        // Probar con la siguiente extensión
                    }
                }
                return null; // no existe imagen para este item
            } catch (e) {
                console.warn('Error accediendo Firebase Storage:', e);
                return null;
            }
        };
    </script>
    <style>
        /* Fallback de tipografía local sans-serif pero con buen interlineado y suavizado */
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .dark .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Ocultar barra de scroll pero mantener funcionalidad */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Animación del láser del escáner */
        @keyframes laser-sweep {
            0%   { top: 2%; }
            50%  { top: 96%; }
            100% { top: 2%; }
        }
        .animate-laser {
            animation: laser-sweep 2s infinite ease-in-out;
        }

        /* Escaner a pantalla completa: video llena el fondo sin barras negras */
        #reader {
            width: 100% !important;
            height: 100% !important;
            position: absolute !important;
            top: 0; left: 0;
        }
        #reader video {
            width: 100%  !important;
            height: 100% !important;
            object-fit: cover !important;
        }
        /* Ocultar los controles internos que html5-qrcode inserta */
        #reader img, #reader canvas { display: none !important; }
        #reader__header_message { display: none !important; }
        #reader__dashboard { display: none !important; }
        #reader__status_span { display: none !important; }
    </style>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f5f3ff',
                            100: '#ede9fe',
                            200: '#ddd6fe',
                            500: '#6366f1',
                            600: '#4f46e5',
                            700: '#4338ca',
                            900: '#312e81',
                        },
                        darkBg: '#0b0f19',
                        darkCard: '#151f32'
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-slate-50 dark:bg-darkBg text-slate-800 dark:text-slate-200 min-h-screen transition-colors duration-300">

    <div class="max-w-md mx-auto p-4 flex flex-col min-h-screen pb-16">

        <!-- CABECERA -->
        <header class="flex justify-between items-center mb-6">

                </div>

                    <h1 class="text-xl font-extrabold tracking-tight bg-gradient-to-r from-brand-600 to-brand-500 bg-clip-text text-transparent dark:from-brand-500 dark:to-violet-400">

                    <!-- Marco de la ventana de escaneo -->

                        <div class="absolute -bottom-0.5 -left-0.5 w-8 h-8 border-b-[3px] border-l-[3px] border-brand-500 rounded-bl"></div>

    <!-- SCRIPTS LÓGICA DE LA APLICACIÓN -->
    <script>
        let maestroData = [];
        let maestroComponentsData = [];
        let activeTab = 'sub'; // 'sub' o 'parent'
        let currentItem = null;
        
        // Variables para Escáner
        let html5QrCode = null;
        let cameras = [];
        let currentCameraIndex = 0;
        let isScannerStarting = false;
        let isFromScan = false;

        // Elementos UI
        const searchInput = document.getElementById('search-input');
        const clearBtn = document.getElementById('clear-btn');
        const resultsList = document.getElementById('results-list');
        const resultsCount = document.getElementById('results-count');
        const loadingStatus = document.getElementById('loading-status');
        const emptyState = document.getElementById('empty-state');
        const dataStatusLabel = document.getElementById('data-status-label');

        // Modal
        const detailModal = document.getElementById('detail-modal');
        const detailPanel = document.getElementById('detail-panel');

        // Carga inicial de datos
        async function loadLocalData() {
            try {
                dataStatusLabel.textContent = "Cargando catálogos...";
                
                // Cargar maestro.json
                const res1 = await fetch('./maestro.json');
                if (!res1.ok) throw new Error("No se pudo leer maestro.json local");
                const rawMaestro = await res1.json();
                maestroData = rawMaestro.map(item => ({
                    catalogo: String(item['MATERIAL'] || item['Material'] || item.catalogo || ''),
                    descripcion: String(item['TEXTO'] || item['Texto_breve_de_material'] || item.descripcion || ''),
                    codigo_parte: String(item['CÓDIGO DE PARTE'] || item['Part_Number'] || item.codigo_parte || ''),
                    originalData: item
                }));

                // Cargar maestro2k.json
                const res2 = await fetch('./maestro2k.json');
                if (!res2.ok) throw new Error("No se pudo leer maestro2k.json local");
                const rawComponents = await res2.json();
                maestroComponentsData = rawComponents.map(item => ({
                    catalogo: String(item['Material'] || ''),
                    componente: String(item['Componente'] || ''),
                    descripcion: item['Descripción.1'] || item['Descripción'] || '',
                    codigo_parte: item['Código de parte.1'] || item['Código de parte'] || '',
                    cantidad: item['Cantidad'] || '',
                    originalData: item
                }));

                dataStatusLabel.textContent = `Listos: ${maestroData.length} ítems.`;
                showEmptyStateMessage("Buscador listo", "Escribe el nombre del catálogo, código o parte para empezar a buscar.", "🔎");
            } catch (e) {
                console.error(e);
                dataStatusLabel.textContent = "Error al cargar archivos locales.";
                showEmptyStateMessage("Error de Carga", "No se encontraron los archivos JSON locales en el proyecto.", "⚠️");
            }
        }

        // Helper para mostrar estado vacío
        function showEmptyStateMessage(title, text, emoji = "🤷") {
            const isBuscadorListo = (title === "Buscador listo");
            
            emptyState.innerHTML = `
                <div class="w-16 h-16 bg-brand-50 dark:bg-slate-800 rounded-full flex items-center justify-center mx-auto mb-4 ${isBuscadorListo ? 'group-hover:scale-110 transition-transform duration-200' : ''}">
                    <span class="text-3xl">${emoji}</span>
                </div>
                <h3 class="text-base font-bold text-slate-700 dark:text-slate-200">${title}</h3>
                <p class="text-xs text-slate-400 mt-1 max-w-[220px] mx-auto">${text}</p>
                ${isBuscadorListo ? '<span class="text-[10px] text-brand-600 dark:text-brand-400 font-bold mt-4 block uppercase tracking-wider animate-pulse flex items-center justify-center gap-1">📷 Toca aquí para escanear</span>' : ''}
            `;
            
            if (isBuscadorListo) {
                emptyState.className = "text-center py-20 bg-white dark:bg-darkCard rounded-3xl border border-slate-100 dark:border-slate-800 shadow-sm p-6 cursor-pointer hover:bg-slate-100/30 dark:hover:bg-slate-800/30 active:scale-[0.98] transition-all duration-150 group";
                emptyState.onclick = openScanner;
            } else {
                emptyState.className = "text-center py-20 bg-white dark:bg-darkCard rounded-3xl border border-slate-100 dark:border-slate-800 shadow-sm p-6";
                emptyState.onclick = null;
            }
            emptyState.classList.remove('hidden');
        }

        // Debounce helper para no congelar la UI
        function debounce(func, delay = 250) {
            let timeoutId;
            return function (...args) {
                clearTimeout(timeoutId);
                loadingStatus.classList.remove('hidden');
                timeoutId = setTimeout(() => {
                    func.apply(this, args);
                    loadingStatus.classList.add('hidden');
                }, delay);
            };
        }

        // Realizar Búsqueda
        function performSearch() {
            const query = searchInput.value.toLowerCase().trim();
            resultsList.innerHTML = '';
            
            if (query === '') {
                clearBtn.classList.add('hidden');
                resultsCount.textContent = '';
                showEmptyStateMessage("Buscador listo", "Escribe el nombre del catálogo, código o parte para empezar a buscar.", "🔎");
                return;
            }

            clearBtn.classList.remove('hidden');

            // Normalización para búsqueda insensible a símbolos/espacios
            const normQuery = query.replace(/[\s\/\-_()]/g, '');

            // 1. Filtrado por prioridades: Catálogo (coincidencia de texto clásica)
            let filtered = maestroData.filter(item => 
                String(item.catalogo || '').toLowerCase().includes(query)
            );

            // 2. Prioridad: Código de Parte (insensible a guiones, barras, espacios, etc.)
            if (filtered.length === 0) {
                filtered = maestroData.filter(item => {
                    const normPart = String(item.codigo_parte || '').replace(/[\s\/\-_()]/g, '').toLowerCase();
                    return normPart.includes(normQuery);
                });
            }

            // 3. Prioridad: Descripción
            if (filtered.length === 0) {
                filtered = maestroData.filter(item => 
                    String(item.descripcion || '').toLowerCase().includes(query)
                );
            }

            if (filtered.length === 0) {
                resultsCount.textContent = '0 resultados';
                showEmptyStateMessage("Sin Resultados", `No se encontraron ítems que coincidan con "${query}".`, "🤷");
                return;
            }

            // Ocultar mensaje de vacío
            emptyState.classList.add('hidden');
            resultsCount.textContent = `${filtered.length} encontrado(s)`;

            // Si es un escaneo y hay exactamente 1 resultado, abrir los detalles directamente
            if (isFromScan && filtered.length === 1) {
                isFromScan = false;
                setTimeout(() => {
                    openDetail(filtered[0]);
                }, 300);
            }

            // Renderizar resultados (limitado a 50 por rendimiento móvil)
            const listContainer = document.createDocumentFragment();
            filtered.slice(0, 50).forEach(item => {
                // Verificar si tiene subcomponentes asociados en maestro2k.json
                const hasRelations = maestroComponentsData.some(c => c.catalogo === item.catalogo || c.componente === item.catalogo);
                
                const card = document.createElement('div');
                card.className = "p-4 bg-white dark:bg-darkCard rounded-2xl border border-slate-100 dark:border-slate-800 shadow-sm active:scale-[0.98] transition-transform duration-100 cursor-pointer flex justify-between items-center gap-3";
                card.onclick = () => openDetail(item);

                card.innerHTML = `
                    <div class="min-w-0 flex-1">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="text-xs font-bold text-slate-400 font-mono tracking-tight">${item.catalogo}</span>
                            ${hasRelations ? '<span class="text-[9px] bg-brand-100 dark:bg-brand-900/30 text-brand-600 dark:text-brand-400 font-bold px-1.5 py-0.5 rounded-full">🧩 Relacionado</span>' : ''}
                        </div>
                        <h4 class="font-bold text-slate-800 dark:text-white text-sm truncate">${item.descripcion || 'Sin descripción'}</h4>
                        <p class="text-xs text-slate-500 dark:text-slate-400 mt-1 truncate">Parte: ${item.codigo_parte || 'N/A'}</p>
                    </div>
                    <span class="text-slate-300 dark:text-slate-600 text-lg flex-shrink-0">➡️</span>
                `;
                listContainer.appendChild(card);
            });

            resultsList.appendChild(listContainer);
        }

        // Limpiar buscador
        window.clearSearch = function () {
            searchInput.value = '';
            performSearch();
            searchInput.focus();
        }

        // Abrir Detalle del Ítem
        function openDetail(item) {
            currentItem = item;
            
            document.getElementById('modal-title').textContent = item.catalogo;
            document.getElementById('modal-part').textContent = `Nº de Parte: ${item.codigo_parte || 'N/A'}`;
            document.getElementById('modal-desc').textContent = item.descripcion || 'Este material no contiene descripción adicional.';

            // --- Cargar imagen desde Firebase Storage ---
            const imgContainer = document.getElementById('modal-image-container');
            const imgEl = document.getElementById('modal-image');
            const imgLoading = document.getElementById('modal-image-loading');

            // Resetear a estado de carga
            imgContainer.classList.remove('hidden');
            imgLoading.classList.remove('hidden');
            imgEl.src = '';

            // Intentar obtener la URL (requiere conexión)
            if (typeof window.getFirebaseImageUrl === 'function') {
                window.getFirebaseImageUrl(item.catalogo).then(url => {
                    if (url) {
                        imgEl.src = url;
                        imgEl.onload = () => imgLoading.classList.add('hidden');
                        imgEl.onerror = () => imgContainer.classList.add('hidden');
                    } else {
                        imgContainer.classList.add('hidden');
                    }
                }).catch(() => imgContainer.classList.add('hidden'));
            } else {
                // Firebase aún no disponible (sin conexión)
                imgContainer.classList.add('hidden');
            }

            // Cargar Relaciones
            const subcomponents = maestroComponentsData.filter(c => c.catalogo === item.catalogo);
            const parents = maestroComponentsData.filter(c => c.componente === item.catalogo);

            document.getElementById('sub-count').textContent = subcomponents.length;
            document.getElementById('parent-count').textContent = parents.length;

            // Render subcomponentes
            const subContainer = document.getElementById('subcomponents-container');
            subContainer.innerHTML = '';
            if (subcomponents.length === 0) {
                subContainer.innerHTML = '<p class="text-center text-xs text-slate-400 py-6 italic">No tiene componentes hijos asociados.</p>';
            } else {
                subcomponents.forEach(c => {
                    const div = document.createElement('div');
                    div.className = "p-3 bg-slate-50 dark:bg-slate-800 rounded-xl border border-slate-100 dark:border-slate-700/50 flex justify-between items-center gap-2 active:bg-slate-100 dark:active:bg-slate-700 cursor-pointer";
                    div.onclick = () => navigateToItem(c.componente);
                    div.innerHTML = `
                        <div class="min-w-0 flex-1">
                            <p class="text-xs font-bold text-slate-400 font-mono">${c.componente}</p>
                            <p class="text-sm font-bold text-slate-700 dark:text-slate-200 truncate">${c.descripcion}</p>
                            <p class="text-[10px] text-slate-500 truncate">Parte: ${c.codigo_parte || 'N/A'}</p>
                        </div>
                        <div class="bg-brand-50 dark:bg-brand-900/30 text-brand-600 dark:text-brand-400 font-bold text-xs px-2.5 py-1 rounded-lg flex-shrink-0">
                            Cant: ${c.cantidad || 1}
                        </div>
                    `;
                    subContainer.appendChild(div);
                });
            }

            // Render padres
            const parentContainer = document.getElementById('parents-container');
            parentContainer.innerHTML = '';
            if (parents.length === 0) {
                parentContainer.innerHTML = '<p class="text-center text-xs text-slate-400 py-6 italic">No se utiliza como componente de ningún ensamble.</p>';
            } else {
                parents.forEach(c => {
                    const div = document.createElement('div');
                    div.className = "p-3 bg-slate-50 dark:bg-slate-800 rounded-xl border border-slate-100 dark:border-slate-700/50 flex justify-between items-center gap-2 active:bg-slate-100 dark:active:bg-slate-700 cursor-pointer";
                    div.onclick = () => navigateToItem(c.catalogo);
                    div.innerHTML = `
                        <div class="min-w-0 flex-1">
                            <p class="text-xs font-bold text-slate-400 font-mono">${c.catalogo}</p>
                            <p class="text-sm font-bold text-slate-700 dark:text-slate-200 truncate">${c.descripcion || 'Solución/Padre'}</p>
                            <p class="text-[10px] text-slate-500 truncate">Parte: ${c.codigo_parte || 'N/A'}</p>
                        </div>
                        <span class="text-slate-300 dark:text-slate-600 text-sm flex-shrink-0">➡️</span>
                    `;
                    parentContainer.appendChild(div);
                });
            }

            // Resetear Tab activo
            switchTab('sub');

            // Abrir Modal
            detailModal.classList.remove('hidden');
            setTimeout(() => {
                detailModal.classList.remove('opacity-0');
                detailPanel.classList.remove('translate-y-full');
            }, 10);
        }

        // Navegar a un item directamente desde la vista de detalles
        function navigateToItem(catalogo) {
            const foundItem = maestroData.find(i => i.catalogo === catalogo);
            if (foundItem) {
                openDetail(foundItem);
            } else {
                // Si no se encuentra en el maestro general, creamos uno al vuelo basado en la info de la relación
                const fromRelation = maestroComponentsData.find(c => c.componente === catalogo || c.catalogo === catalogo);
                if (fromRelation) {
                    const isParent = fromRelation.catalogo === catalogo;
                    openDetail({
                        catalogo: catalogo,
                        descripcion: isParent ? (fromRelation.originalData['Descripción'] || 'Solución') : fromRelation.descripcion,
                        codigo_parte: isParent ? (fromRelation.originalData['Código de parte'] || '') : fromRelation.codigo_parte
                    });
                } else {
                    Swal.fire({
                        icon: 'info',
                        title: 'Detalle no disponible',
                        text: `El ítem "${catalogo}" no tiene detalles registrados en el maestro.`,
                        confirmButtonColor: '#4f46e5'
                    });
                }
            }
        }

        // Cerrar Modal
        window.closeDetailModal = function () {
            detailPanel.classList.add('translate-y-full');
            detailModal.classList.add('opacity-0');
            setTimeout(() => {
                detailModal.classList.add('hidden');
            }, 300);
        }

        // Cerrar al tocar fuera del modal
        detailModal.addEventListener('click', (e) => {
            if (e.target === detailModal) {
                closeDetailModal();
            }
        });

        // Alternar entre Tabs del detalle - TOGGLE: toca el activo para ocultar, el otro para mostrar
        window.switchTab = function (tab) {
            const tabSub = document.getElementById('tab-sub');
            const tabParent = document.getElementById('tab-parent');
            const subContainer = document.getElementById('subcomponents-container');
            const parentContainer = document.getElementById('parents-container');
            const tabContent = document.getElementById('tab-content-wrapper');

            // Si se toca el tab ya activo -> OCULTAR (toggle)
            if (activeTab === tab) {
                activeTab = null;
                tabSub.className = "flex-1 pb-3 text-slate-400 dark:text-slate-500 border-b-2 border-transparent transition-colors";
                tabParent.className = "flex-1 pb-3 text-slate-400 dark:text-slate-500 border-b-2 border-transparent transition-colors";
                subContainer.classList.add('hidden');
                parentContainer.classList.add('hidden');
                if (tabContent) tabContent.classList.add('hidden');
                return;
            }

            // Si se toca el tab inactivo -> MOSTRAR ese contenido
            activeTab = tab;
            if (tabContent) tabContent.classList.remove('hidden');

            if (tab === 'sub') {
                tabSub.className = "flex-1 pb-3 text-brand-600 dark:text-brand-500 border-b-2 border-brand-600 dark:border-brand-500 transition-colors";
                tabParent.className = "flex-1 pb-3 text-slate-400 dark:text-slate-500 border-b-2 border-transparent transition-colors";
                subContainer.classList.remove('hidden');
                parentContainer.classList.add('hidden');
            } else {
                tabParent.className = "flex-1 pb-3 text-brand-600 dark:text-brand-500 border-b-2 border-brand-600 dark:border-brand-500 transition-colors";
                tabSub.className = "flex-1 pb-3 text-slate-400 dark:text-slate-500 border-b-2 border-transparent transition-colors";
                parentContainer.classList.remove('hidden');
                subContainer.classList.add('hidden');
            }
        }

        // Alternar modo oscuro
        window.toggleDarkMode = function () {
            const html = document.documentElement;
            const themeBtn = document.getElementById('theme-btn');
            
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.setItem('theme', 'light');
                themeBtn.textContent = '🌙';
            } else {
                html.classList.add('dark');
                localStorage.setItem('theme', 'dark');
                themeBtn.textContent = '☀️';
            }
        }

        // Cargar tema guardado
        function initTheme() {
            const savedTheme = localStorage.getItem('theme') || 'dark'; // Dark mode por defecto para wow visual
            const themeBtn = document.getElementById('theme-btn');
            
            if (savedTheme === 'dark') {
                document.documentElement.classList.add('dark');
                themeBtn.textContent = '☀️';
            } else {
                document.documentElement.classList.remove('dark');
                themeBtn.textContent = '🌙';
            }
        }

        // --- FUNCIONES DEL ESCÁNER DE CÁMARA (html5-qrcode) ---

        // Función para reproducir sonido de beep en éxito de lectura (Web Audio API nativa)
        function playBeep() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                oscillator.type = 'sine';
                oscillator.frequency.value = 1000;
                gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 0.05);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
                
                oscillator.start(audioCtx.currentTime);
                oscillator.stop(audioCtx.currentTime + 0.15);
            } catch (e) {
                console.error("No se pudo reproducir el sonido:", e);
            }
        }

        // Algoritmo de extracción/parsing de códigos
        function parseScanResult(text) {
            text = text.trim();
            console.log("Procesando código escaneado:", text);
            
            // 1. Detección de formato Ericsson (DataMatrix o 1D con prefijos)
            // Extrae "KRC 161 495/1" de "1PKRC 161 495/1SCA74150981" o "(1P)KRC 161 495/1"
            const ericssonPartRegex = /(?:1P|\(1P\))?\s*(KRC\s*\d{3}\s*\d{3,4}(?:\/\d+)?)/i;
            const ericssonMatch = text.match(ericssonPartRegex);
            if (ericssonMatch) {
                return ericssonMatch[1].trim();
            }

            // 2. Detección de formato Huawei (Serial completo y extracción de BOM)
            // Caso Huawei BBU box completo: "SN:2102311VFFP0Q9001339 Y WD2M0BBU5900"
            if (text.includes("WD2M0BBU5900")) {
                return "WD2M0BBU5900";
            }
            
            // Caso número de serie estándar (extraer código de parte de 8 caracteres en posición 2 a 10)
            let cleanSerial = text.replace(/^SN:?/i, '').trim();
            let parts = cleanSerial.split(/\s+/);
            for (let part of parts) {
                if (part.length === 20 && part.startsWith('21')) {
                    return part.substring(2, 10);
                }
            }

            // 3. Limpieza por defecto de paréntesis de identificación (1P), (S), (21P)
            let cleanText = text.replace(/^\((1P|S|21P)\)/i, '');
            cleanText = cleanText.replace(/^(1P|S|21P)/i, '');
            
            return cleanText.trim();
        }

        // =============================================================
        // FUNCIONES DEL ESCÁNER - Rediseñado con pantalla completa y
        // destrucción/recreación del objeto en cada uso.
        // Esto elimina el bug de "permisos perdidos" al volver atrás.
        // =============================================================

        // Liberar TODOS los recursos de cámara del navegador
        async function forceReleaseCamera() {
            // 1. Detener html5QrCode si existe y está activo
            if (html5QrCode) {
                try {
                    if (html5QrCode.isScanning) {
                        await html5QrCode.stop();
                    }
                } catch (e) { /* ignorar */ }
                try {
                    html5QrCode.clear();
                } catch (e) { /* ignorar */ }
                html5QrCode = null; // DESTRUIR COMPLETAMENTE - clave para no perder permisos
            }
            
            // 2. Cortar todas las pistas de video activas del navegador
            try {
                const videos = document.querySelectorAll('#reader video');
                videos.forEach(v => {
                    if (v.srcObject) {
                        v.srcObject.getTracks().forEach(t => t.stop());
                        v.srcObject = null;
                    }
                });
            } catch (e) { /* ignorar */ }
            
            // 3. Limpiar el DOM del reader para la próxima vez
            const reader = document.getElementById('reader');
            if (reader) reader.innerHTML = '';
        }

        // Botón físico "Atrás" de Android: cierra el escáner en vez de salir
        window.addEventListener('popstate', function () {
            const modal = document.getElementById('scanner-modal');
            if (modal && !modal.classList.contains('hidden')) {
                closeScanner(true);
            }
        });

        // Abrir escáner e iniciar cámara
        window.openScanner = async function () {
            if (isScannerStarting) return;
            isScannerStarting = true;

            searchInput.blur();

            const modal = document.getElementById('scanner-modal');
            modal.classList.remove('hidden');
            setTimeout(() => modal.classList.remove('opacity-0'), 10);
            document.getElementById('scanner-error').classList.add('hidden');

            try {
                // Siempre crear una nueva instancia limpia
                const formats = window.Html5QrcodeSupportedFormats;
                const options = {};
                if (formats) {
                    options.formatsToSupport = [
                        formats.QR_CODE,
                        formats.DATA_MATRIX,
                        formats.CODE_128,
                        formats.CODE_39,
                        formats.EAN_13,
                        formats.UPC_A
                    ].filter(f => f !== undefined);
                }
                html5QrCode = new Html5Qrcode('reader', options);

                // Obtener lista de cámaras disponibles (solo la primera vez)
                if (cameras.length === 0) {
                    const devices = await Html5Qrcode.getCameras();
                    if (!devices || devices.length === 0) throw new Error('Sin cámaras.');
                    cameras = devices;
                    // Buscar cámara trasera principal
                    const backIdx = devices.findIndex(d => {
                        const lbl = d.label.toLowerCase();
                        return lbl.includes('back') || lbl.includes('rear') || lbl.includes('trasera') || lbl.includes('camera 0') || lbl.includes('cámara 0');
                    });
                    currentCameraIndex = backIdx !== -1 ? backIdx : 0;
                }

                // Configuración: zona de detección grande y relación 4:3
                const config = {
                    fps: 15,
                    qrbox: (w, h) => ({
                        width:  Math.round(w * 0.85),
                        height: Math.round(h * 0.65)
                    }),
                    aspectRatio: 1.333333
                };

                const cam = cameras[currentCameraIndex];
                await html5QrCode.start(cam.id, config, onScanSuccess, onScanFailure);

                // Activar autofoco continuo si el dispositivo lo soporta
                setTimeout(() => {
                    try {
                        const track = html5QrCode.getRunningTrack();
                        if (track?.getCapabilities) {
                            const caps = track.getCapabilities();
                            if (caps.focusMode?.includes('continuous')) {
                                track.applyConstraints({ advanced: [{ focusMode: 'continuous' }] })
                                     .catch(() => {});
                            }
                        }
                    } catch (e) {}
                }, 800);

                // Registrar en historial para capturar botón físico Atrás
                window.history.pushState({ modal: 'scanner' }, '');

            } catch (err) {
                console.error('Error iniciando cámara:', err);
                const errEl = document.getElementById('scanner-error');
                errEl.textContent = 'No se pudo acceder a la cámara. Verificá los permisos en Ajustes del celular.';
                errEl.classList.remove('hidden');
            } finally {
                isScannerStarting = false;
            }
        };

        // Lectura exitosa de código
        function onScanSuccess(decodedText) {
            playBeep();
            closeScanner(); // libera cámara

            const parsed = parseScanResult(decodedText);
            isFromScan = true;
            searchInput.value = parsed;
            performSearch();

            Swal.fire({
                icon: 'success',
                title: 'Código Leído ✅',
                text: `Buscando: ${parsed}`,
                timer: 1800,
                showConfirmButton: false,
                position: 'top',
                toast: true
            });
        }

        function onScanFailure() { /* silenciar fallos por cuadro */ }

        // Cerrar y liberar la cámara por completo
        window.closeScanner = async function (isBackNav) {
            const modal = document.getElementById('scanner-modal');
            modal.classList.add('opacity-0');

            await forceReleaseCamera(); // destruye y libera todo

            // Si fue por botón X (no por Atrás), sacar el estado del historial
            if (!isBackNav) {
                if (window.history.state?.modal === 'scanner') {
                    window.history.back();
                }
            }

            setTimeout(() => modal.classList.add('hidden'), 300);
        };

        // Cambiar a la siguiente lente disponible
        window.switchCamera = async function () {
            if (cameras.length <= 1) {
                Swal.fire({ icon:'info', title:'Cámara única', text:'No hay otras lentes disponibles.', timer:1500, showConfirmButton:false, position:'top', toast:true });
                return;
            }
            await forceReleaseCamera();
            currentCameraIndex = (currentCameraIndex + 1) % cameras.length;
            isScannerStarting = false; // resetear bandera para reabrir
            openScanner();
        };

        // Inicializar escuchas
        function init() {
            initTheme();
            loadLocalData();
            searchInput.addEventListener('input', debounce(performSearch));
        }

        window.onload = init;
    </script>
</body>
