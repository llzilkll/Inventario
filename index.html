<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador GRAM - Maestro de Ítems</title>
    <!-- Librerías locales offline -->
    <script src="./js/lib/tailwind.js"></script>
    <script src="./js/lib/sweetalert2.all.min.js"></script>
    <style>
        /* Fallback de tipografía local sans-serif pero con buen interlineado y suavizado */
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .dark .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Ocultar barra de scroll pero mantener funcionalidad */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f5f3ff',
                            100: '#ede9fe',
                            200: '#ddd6fe',
                            500: '#6366f1',
                            600: '#4f46e5',
                            700: '#4338ca',
                            900: '#312e81',
                        },
                        darkBg: '#0b0f19',
                        darkCard: '#151f32'
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-slate-50 dark:bg-darkBg text-slate-800 dark:text-slate-200 min-h-screen transition-colors duration-300">

    <div class="max-w-md mx-auto p-4 flex flex-col min-h-screen pb-16">

        <!-- CABECERA -->
        <header class="flex justify-between items-center mb-6">
            <div class="flex items-center gap-2">
                <div class="p-2 rounded-xl bg-brand-600 text-white shadow-lg shadow-brand-500/20">
                    <span class="text-xl">📚</span>
                </div>
                <div>
                    <h1 class="text-xl font-extrabold tracking-tight bg-gradient-to-r from-brand-600 to-brand-500 bg-clip-text text-transparent dark:from-brand-500 dark:to-violet-400">
                        Buscador GRAM
                    </h1>
                    <p class="text-[10px] text-slate-400 font-semibold uppercase tracking-wider">Maestro de Ítems (Offline)</p>
                </div>
            </div>
            
            <button onclick="toggleDarkMode()" id="theme-btn" class="p-2.5 rounded-xl glass-panel shadow-sm text-slate-500 dark:text-amber-400 hover:scale-105 active:scale-95 transition-transform duration-150">
                🌙
            </button>
        </header>

        <!-- BUSCADOR -->
        <div class="mb-5 relative">
            <div class="relative glass-panel rounded-2xl shadow-md overflow-hidden">
                <span class="absolute left-4 top-4 text-slate-400 text-lg">🔎</span>
                <input type="text" id="search-input" placeholder="Buscar por catálogo, descripción o parte..."
                    class="w-full bg-transparent pl-11 pr-10 py-4 outline-none text-slate-800 dark:text-white font-medium text-sm placeholder-slate-400 dark:placeholder-slate-500">
                <button onclick="clearSearch()" id="clear-btn" class="absolute right-4 top-4 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 hidden">
                    ❌
                </button>
            </div>
            
            <div class="flex items-center justify-between mt-2 px-1">
                <span id="results-count" class="text-[11px] text-slate-400 font-medium"></span>
                <span id="loading-status" class="text-[11px] text-brand-600 dark:text-brand-500 font-bold hidden flex items-center gap-1">
                    <svg class="animate-spin h-3.5 w-3.5 text-current inline" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    Buscando...
                </span>
            </div>
        </div>

        <!-- LISTADO DE RESULTADOS -->
        <main class="flex-1">
            <div id="results-list" class="space-y-3">
                <!-- Estado Inicial / Cargando -->
                <div id="empty-state" class="text-center py-20 bg-white dark:bg-darkCard rounded-3xl border border-slate-100 dark:border-slate-800 shadow-sm p-6">
                    <div class="w-16 h-16 bg-brand-50 dark:bg-slate-800 rounded-full flex items-center justify-center mx-auto mb-4">
                        <span class="text-3xl">📦</span>
                    </div>
                    <h3 class="text-base font-bold text-slate-700 dark:text-slate-200">Cargando base de datos...</h3>
                    <p class="text-xs text-slate-400 mt-1 max-w-[200px] mx-auto">Por favor, espera unos segundos mientras preparamos el catálogo local.</p>
                </div>
            </div>
        </main>
        
        <!-- FOOTER E INFO DE CARGA -->
        <footer class="mt-8 text-center text-[10px] text-slate-400">
            <p>GRAM Inventario Móvil • Sin Conexión</p>
            <p id="data-status-label" class="mt-1 text-slate-500 italic">Cargando maestros...</p>
        </footer>

    </div>

    <!-- MODAL DETALLES DEL ÍTEM -->
    <div id="detail-modal" class="fixed inset-0 z-50 bg-black/60 backdrop-blur-sm flex items-end justify-center hidden opacity-0 transition-opacity duration-300">
        <!-- Panel del Modal -->
        <div id="detail-panel" class="w-full max-w-md bg-white dark:bg-darkCard rounded-t-[32px] p-6 shadow-2xl transform translate-y-full transition-transform duration-300 max-h-[85vh] flex flex-col border-t border-slate-100 dark:border-slate-800">
            
            <!-- Barra de arrastre visual -->
            <div class="w-12 h-1.5 bg-slate-200 dark:bg-slate-700 rounded-full mx-auto mb-5 cursor-pointer" onclick="closeDetailModal()"></div>
            
            <!-- Encabezado del Detalle -->
            <div class="flex justify-between items-start mb-4">
                <div class="flex-1 min-w-0 pr-2">
                    <span class="text-[10px] uppercase font-bold tracking-wider text-brand-600 dark:text-brand-500">Detalle del Material</span>
                    <h2 id="modal-title" class="text-xl font-extrabold text-slate-900 dark:text-white truncate"></h2>
                    <p id="modal-part" class="text-xs font-mono text-slate-500 dark:text-slate-400 mt-0.5"></p>
                </div>
                <button onclick="closeDetailModal()" class="p-2 rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 hover:bg-slate-200 dark:hover:bg-slate-700 transition">
                    ✕
                </button>
            </div>

            <!-- Descripción -->
            <div class="bg-slate-50 dark:bg-slate-800/50 p-3.5 rounded-2xl border border-slate-100 dark:border-slate-800 mb-5">
                <p id="modal-desc" class="text-sm text-slate-600 dark:text-slate-300 font-medium"></p>
            </div>

            <!-- Tabs para Relaciones (Subcomponentes / Se usa en) -->
            <div class="flex border-b border-slate-100 dark:border-slate-800 mb-4 text-sm font-bold">
                <button onclick="switchTab('sub')" id="tab-sub" class="flex-1 pb-3 text-brand-600 dark:text-brand-500 border-b-2 border-brand-600 dark:border-brand-500 transition-colors">
                    🧩 Subcomponentes (<span id="sub-count">0</span>)
                </button>
                <button onclick="switchTab('parent')" id="tab-parent" class="flex-1 pb-3 text-slate-400 dark:text-slate-500 border-b-2 border-transparent hover:text-slate-600 transition-colors">
                    ⛓️ Se usa en (<span id="parent-count">0</span>)
                </button>
            </div>

            <!-- Contenido del Tab (Scrolleable) -->
            <div class="flex-1 overflow-y-auto no-scrollbar space-y-3 pb-6">
                <!-- Contenedor Subcomponentes -->
                <div id="subcomponents-container" class="space-y-2"></div>
                <!-- Contenedor Padres -->
                <div id="parents-container" class="space-y-2 hidden"></div>
            </div>

        </div>
    </div>

    <!-- SCRIPTS LÓGICA DE LA APLICACIÓN -->
    <script>
        let maestroData = [];
        let maestroComponentsData = [];
        let activeTab = 'sub'; // 'sub' o 'parent'
        let currentItem = null;

        // Elementos UI
        const searchInput = document.getElementById('search-input');
        const clearBtn = document.getElementById('clear-btn');
        const resultsList = document.getElementById('results-list');
        const resultsCount = document.getElementById('results-count');
        const loadingStatus = document.getElementById('loading-status');
        const emptyState = document.getElementById('empty-state');
        const dataStatusLabel = document.getElementById('data-status-label');

        // Modal
        const detailModal = document.getElementById('detail-modal');
        const detailPanel = document.getElementById('detail-panel');

        // Carga inicial de datos
        async function loadLocalData() {
            try {
                dataStatusLabel.textContent = "Cargando catálogos...";
                
                // Cargar maestro.json
                const res1 = await fetch('./maestro.json');
                if (!res1.ok) throw new Error("No se pudo leer maestro.json local");
                const rawMaestro = await res1.json();
                maestroData = rawMaestro.map(item => ({
                    catalogo: String(item['MATERIAL'] || item['Material'] || item.catalogo || ''),
                    descripcion: String(item['TEXTO'] || item['Texto_breve_de_material'] || item.descripcion || ''),
                    codigo_parte: String(item['CÓDIGO DE PARTE'] || item['Part_Number'] || item.codigo_parte || ''),
                    originalData: item
                }));

                // Cargar maestro2k.json
                const res2 = await fetch('./maestro2k.json');
                if (!res2.ok) throw new Error("No se pudo leer maestro2k.json local");
                const rawComponents = await res2.json();
                maestroComponentsData = rawComponents.map(item => ({
                    catalogo: String(item['Material'] || ''),
                    componente: String(item['Componente'] || ''),
                    descripcion: item['Descripción.1'] || item['Descripción'] || '',
                    codigo_parte: item['Código de parte.1'] || item['Código de parte'] || '',
                    cantidad: item['Cantidad'] || '',
                    originalData: item
                }));

                dataStatusLabel.textContent = `Listos: ${maestroData.length} ítems.`;
                showEmptyStateMessage("Buscador listo", "Escribe el nombre del catálogo, código o parte para empezar a buscar.", "🔎");
            } catch (e) {
                console.error(e);
                dataStatusLabel.textContent = "Error al cargar archivos locales.";
                showEmptyStateMessage("Error de Carga", "No se encontraron los archivos JSON locales en el proyecto.", "⚠️");
            }
        }

        // Helper para mostrar estado vacío
        function showEmptyStateMessage(title, text, emoji = "🤷") {
            emptyState.innerHTML = `
                <div class="w-16 h-16 bg-brand-50 dark:bg-slate-800 rounded-full flex items-center justify-center mx-auto mb-4">
                    <span class="text-3xl">${emoji}</span>
                </div>
                <h3 class="text-base font-bold text-slate-700 dark:text-slate-200">${title}</h3>
                <p class="text-xs text-slate-400 mt-1 max-w-[220px] mx-auto">${text}</p>
            `;
            emptyState.classList.remove('hidden');
        }

        // Debounce helper para no congelar la UI
        function debounce(func, delay = 250) {
            let timeoutId;
            return function (...args) {
                clearTimeout(timeoutId);
                loadingStatus.classList.remove('hidden');
                timeoutId = setTimeout(() => {
                    func.apply(this, args);
                    loadingStatus.classList.add('hidden');
                }, delay);
            };
        }

        // Realizar Búsqueda
        function performSearch() {
            const query = searchInput.value.toLowerCase().trim();
            resultsList.innerHTML = '';
            
            if (query === '') {
                clearBtn.classList.add('hidden');
                resultsCount.textContent = '';
                showEmptyStateMessage("Buscador listo", "Escribe el nombre del catálogo, código o parte para empezar a buscar.", "🔎");
                return;
            }

            clearBtn.classList.remove('hidden');

            // Filtrado por prioridades
            let filtered = maestroData.filter(item => 
                String(item.catalogo || '').toLowerCase().includes(query)
            );

            if (filtered.length === 0) {
                filtered = maestroData.filter(item => 
                    String(item.codigo_parte || '').toLowerCase().includes(query)
                );
            }

            if (filtered.length === 0) {
                filtered = maestroData.filter(item => 
                    String(item.descripcion || '').toLowerCase().includes(query)
                );
            }

            if (filtered.length === 0) {
                resultsCount.textContent = '0 resultados';
                showEmptyStateMessage("Sin Resultados", `No se encontraron ítems que coincidan con "${query}".`, "🤷");
                return;
            }

            // Ocultar mensaje de vacío
            emptyState.classList.add('hidden');
            resultsCount.textContent = `${filtered.length} encontrado(s)`;

            // Renderizar resultados (limitado a 50 por rendimiento móvil)
            const listContainer = document.createDocumentFragment();
            filtered.slice(0, 50).forEach(item => {
                // Verificar si tiene subcomponentes asociados en maestro2k.json
                const hasRelations = maestroComponentsData.some(c => c.catalogo === item.catalogo || c.componente === item.catalogo);
                
                const card = document.createElement('div');
                card.className = "p-4 bg-white dark:bg-darkCard rounded-2xl border border-slate-100 dark:border-slate-800 shadow-sm active:scale-[0.98] transition-transform duration-100 cursor-pointer flex justify-between items-center gap-3";
                card.onclick = () => openDetail(item);

                card.innerHTML = `
                    <div class="min-w-0 flex-1">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="text-xs font-bold text-slate-400 font-mono tracking-tight">${item.catalogo}</span>
                            ${hasRelations ? '<span class="text-[9px] bg-brand-100 dark:bg-brand-900/30 text-brand-600 dark:text-brand-400 font-bold px-1.5 py-0.5 rounded-full">🧩 Relacionado</span>' : ''}
                        </div>
                        <h4 class="font-bold text-slate-800 dark:text-white text-sm truncate">${item.descripcion || 'Sin descripción'}</h4>
                        <p class="text-xs text-slate-500 dark:text-slate-400 mt-1 truncate">Parte: ${item.codigo_parte || 'N/A'}</p>
                    </div>
                    <span class="text-slate-300 dark:text-slate-600 text-lg flex-shrink-0">➡️</span>
                `;
                listContainer.appendChild(card);
            });

            resultsList.appendChild(listContainer);
        }

        // Limpiar buscador
        window.clearSearch = function () {
            searchInput.value = '';
            performSearch();
            searchInput.focus();
        }

        // Abrir Detalle del Ítem
        function openDetail(item) {
            currentItem = item;
            
            document.getElementById('modal-title').textContent = item.catalogo;
            document.getElementById('modal-part').textContent = `Nº de Parte: ${item.codigo_parte || 'N/A'}`;
            document.getElementById('modal-desc').textContent = item.descripcion || 'Este material no contiene descripción adicional.';

            // Cargar Relaciones
            const subcomponents = maestroComponentsData.filter(c => c.catalogo === item.catalogo);
            const parents = maestroComponentsData.filter(c => c.componente === item.catalogo);

            document.getElementById('sub-count').textContent = subcomponents.length;
            document.getElementById('parent-count').textContent = parents.length;

            // Render subcomponentes
            const subContainer = document.getElementById('subcomponents-container');
            subContainer.innerHTML = '';
            if (subcomponents.length === 0) {
                subContainer.innerHTML = '<p class="text-center text-xs text-slate-400 py-6 italic">No tiene componentes hijos asociados.</p>';
            } else {
                subcomponents.forEach(c => {
                    const div = document.createElement('div');
                    div.className = "p-3 bg-slate-50 dark:bg-slate-800 rounded-xl border border-slate-100 dark:border-slate-700/50 flex justify-between items-center gap-2 active:bg-slate-100 dark:active:bg-slate-700 cursor-pointer";
                    div.onclick = () => navigateToItem(c.componente);
                    div.innerHTML = `
                        <div class="min-w-0 flex-1">
                            <p class="text-xs font-bold text-slate-400 font-mono">${c.componente}</p>
                            <p class="text-sm font-bold text-slate-700 dark:text-slate-200 truncate">${c.descripcion}</p>
                            <p class="text-[10px] text-slate-500 truncate">Parte: ${c.codigo_parte || 'N/A'}</p>
                        </div>
                        <div class="bg-brand-50 dark:bg-brand-900/30 text-brand-600 dark:text-brand-400 font-bold text-xs px-2.5 py-1 rounded-lg flex-shrink-0">
                            Cant: ${c.cantidad || 1}
                        </div>
                    `;
                    subContainer.appendChild(div);
                });
            }

            // Render padres
            const parentContainer = document.getElementById('parents-container');
            parentContainer.innerHTML = '';
            if (parents.length === 0) {
                parentContainer.innerHTML = '<p class="text-center text-xs text-slate-400 py-6 italic">No se utiliza como componente de ningún ensamble.</p>';
            } else {
                parents.forEach(c => {
                    const div = document.createElement('div');
                    div.className = "p-3 bg-slate-50 dark:bg-slate-800 rounded-xl border border-slate-100 dark:border-slate-700/50 flex justify-between items-center gap-2 active:bg-slate-100 dark:active:bg-slate-700 cursor-pointer";
                    div.onclick = () => navigateToItem(c.catalogo);
                    div.innerHTML = `
                        <div class="min-w-0 flex-1">
                            <p class="text-xs font-bold text-slate-400 font-mono">${c.catalogo}</p>
                            <p class="text-sm font-bold text-slate-700 dark:text-slate-200 truncate">${c.descripcion || 'Solución/Padre'}</p>
                            <p class="text-[10px] text-slate-500 truncate">Parte: ${c.codigo_parte || 'N/A'}</p>
                        </div>
                        <span class="text-slate-300 dark:text-slate-600 text-sm flex-shrink-0">➡️</span>
                    `;
                    parentContainer.appendChild(div);
                });
            }

            // Resetear Tab activo
            switchTab('sub');

            // Abrir Modal
            detailModal.classList.remove('hidden');
            setTimeout(() => {
                detailModal.classList.remove('opacity-0');
                detailPanel.classList.remove('translate-y-full');
            }, 10);
        }

        // Navegar a un item directamente desde la vista de detalles
        function navigateToItem(catalogo) {
            const foundItem = maestroData.find(i => i.catalogo === catalogo);
            if (foundItem) {
                openDetail(foundItem);
            } else {
                // Si no se encuentra en el maestro general, creamos uno al vuelo basado en la info de la relación
                const fromRelation = maestroComponentsData.find(c => c.componente === catalogo || c.catalogo === catalogo);
                if (fromRelation) {
                    const isParent = fromRelation.catalogo === catalogo;
                    openDetail({
                        catalogo: catalogo,
                        descripcion: isParent ? (fromRelation.originalData['Descripción'] || 'Solución') : fromRelation.descripcion,
                        codigo_parte: isParent ? (fromRelation.originalData['Código de parte'] || '') : fromRelation.codigo_parte
                    });
                } else {
                    Swal.fire({
                        icon: 'info',
                        title: 'Detalle no disponible',
                        text: `El ítem "${catalogo}" no tiene detalles registrados en el maestro.`,
                        confirmButtonColor: '#4f46e5'
                    });
                }
            }
        }

        // Cerrar Modal
        window.closeDetailModal = function () {
            detailPanel.classList.add('translate-y-full');
            detailModal.classList.add('opacity-0');
            setTimeout(() => {
                detailModal.classList.add('hidden');
            }, 300);
        }

        // Cerrar al tocar fuera del modal
        detailModal.addEventListener('click', (e) => {
            if (e.target === detailModal) {
                closeDetailModal();
            }
        });

        // Alternar entre Tabs del detalle
        window.switchTab = function (tab) {
            activeTab = tab;
            const tabSub = document.getElementById('tab-sub');
            const tabParent = document.getElementById('tab-parent');
            const subContainer = document.getElementById('subcomponents-container');
            const parentContainer = document.getElementById('parents-container');

            if (tab === 'sub') {
                tabSub.className = "flex-1 pb-3 text-brand-600 dark:text-brand-500 border-b-2 border-brand-600 dark:border-brand-500 transition-colors";
                tabParent.className = "flex-1 pb-3 text-slate-400 dark:text-slate-500 border-b-2 border-transparent hover:text-slate-600 transition-colors";
                subContainer.classList.remove('hidden');
                parentContainer.classList.add('hidden');
            } else {
                tabParent.className = "flex-1 pb-3 text-brand-600 dark:text-brand-500 border-b-2 border-brand-600 dark:border-brand-500 transition-colors";
                tabSub.className = "flex-1 pb-3 text-slate-400 dark:text-slate-500 border-b-2 border-transparent hover:text-slate-600 transition-colors";
                parentContainer.classList.remove('hidden');
                subContainer.classList.add('hidden');
            }
        }

        // Alternar modo oscuro
        window.toggleDarkMode = function () {
            const html = document.documentElement;
            const themeBtn = document.getElementById('theme-btn');
            
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.setItem('theme', 'light');
                themeBtn.textContent = '🌙';
            } else {
                html.classList.add('dark');
                localStorage.setItem('theme', 'dark');
                themeBtn.textContent = '☀️';
            }
        }

        // Cargar tema guardado
        function initTheme() {
            const savedTheme = localStorage.getItem('theme') || 'dark'; // Dark mode por defecto para wow visual
            const themeBtn = document.getElementById('theme-btn');
            
            if (savedTheme === 'dark') {
                document.documentElement.classList.add('dark');
                themeBtn.textContent = '☀️';
            } else {
                document.documentElement.classList.remove('dark');
                themeBtn.textContent = '🌙';
            }
        }

        // Inicializar escuchas
        function init() {
            initTheme();
            loadLocalData();
            searchInput.addEventListener('input', debounce(performSearch));
        }

        window.onload = init;
    </script>
</body>

</html>
